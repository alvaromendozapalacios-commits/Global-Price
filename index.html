<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GlobalPrice</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
}

input, select, button {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

button {
  background: #22c55e;
  color: white;
  font-weight: bold;
}

.producto {
  background: #1e293b;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
  text-align: left;
}

img {
  width: 100%;
  border-radius: 10px;
}
</style>

</head>

<body>

<div class="container">
  <h2>🌍 GlobalPrice</h2>

  <input type="text" id="busqueda" placeholder="Buscar producto...">

  <select id="pais">
    <option value="peru">Perú</option>
    <option value="mexico">México</option>
    <option value="chile">Chile</option>
  </select>

  <button onclick="calcular()">Buscar</button>

  <div id="resultado"></div>
</div>

<script>
let productos = [
  {
    nombre: "audifonos sony",
    usa: 50,
    china: 30,
    imagen: "https://picsum.photos/300/200?random=1"
  },
  {
    nombre: "mouse logitech",
    usa: 25,
    china: 15,
    imagen: "https://picsum.photos/300/200?random=2"
  },
  {
    nombre: "teclado mecanico",
    usa: 70,
    china: 50,
    imagen: "https://picsum.photos/300/200?random=3"
  },
  {
    nombre: "laptop hp",
    usa: 900,
    china: 700,
    imagen: "https://picsum.photos/300/200?random=4"
  },
  {
    nombre: "celular samsung",
    usa: 800,
    china: 600,
    imagen: "https://picsum.photos/300/200?random=5"
  }
];

function calcular() {
  let busqueda = document.getElementById("busqueda").value.toLowerCase();
  let pais = document.getElementById("pais").value;

  let tipoCambio = {
    peru: 3.8,
    mexico: 17,
    chile: 900
  };

  let envio = 10;
  let impuesto = 0.18;

  let resultadoHTML = "";

  productos.forEach(p => {
    if (p.nombre.includes(busqueda)) {

      let totalUSA = (p.usa + envio) * tipoCambio[pais];
      totalUSA += totalUSA * impuesto;

      let totalChina = (p.china + envio) * tipoCambio[pais];
      totalChina += totalChina * impuesto;

      let mejor = totalUSA < totalChina ? "🇺🇸 USA" : "🇨🇳 China";

      resultadoHTML += `
        <div class="producto">
          <img src="${p.imagen}">
          <h3>${p.nombre}</h3>
          🇺🇸 USA: ${totalUSA.toFixed(2)}<br>
          🇨🇳 China: ${totalChina.toFixed(2)}<br>
          👉 Mejor opción: <b>${mejor}</b>
        </div>
      `;
    }
  });

  if (resultadoHTML === "") {
    resultadoHTML = "❌ No se encontraron productos";
  }

  document.getElementById("resultado").innerHTML = resultadoHTML;
}
</script>

</body>
</html>
